        { id:61, cat:"弱点", q:"你最容易被什么打动？", opts:["真诚的关怀","实际的帮助","浪漫的举动","被理解"] },
        { id:62, cat:"弱点", q:"你的耐心程度是？", opts:["很好很有耐心","一般般","比较差","看事情而定"] },
        { id:63, cat:"弱点", q:"你容易被什么分散注意力？", opts:["手机/社交媒体","周围的人","胡思乱想","外部噪音"] },
        { id:64, cat:"弱点", q:"你觉得自己最需要改进的是？", opts:["自律能力","社交能力","情绪管理","行动力"] }
    ];

    // ============================================================
    // 状态
    // ============================================================
    let state = {
        name: '',
        answers: new Array(64).fill(null),
        currentIdx: 0
    };

    // ============================================================
    // DOM引用
    // ============================================================
    const $ = id => document.getElementById(id);
    const startPage = $('startPage');
    const quizPage = $('quizPage');
    const resultPage = $('resultPage');
    const nameInput = $('nameInput');
    const startBtn = $('startBtn');
    const qUserName = $('qUserName');
    const qNum = $('qNum');
    const progressFill = $('progressFill');
    const qCategory = $('qCategory');
    const qNumber = $('qNumber');
    const qText = $('qText');
    const options = $('options');
    const prevBtn = $('prevBtn');
    const nextBtn = $('nextBtn');
    const resultCard = $('resultCard');

    // ============================================================
    // 开始
    // ============================================================
    startBtn.addEventListener('click', startQuiz);
    nameInput.addEventListener('keydown', e => { if(e.key==='Enter') startQuiz(); });

    function startQuiz() {
        const name = nameInput.value.trim();
        if(!name) { nameInput.style.borderColor = '#f5576c'; nameInput.placeholder = '请先输入名字~'; return; }
        state.name = name;
        state.answers.fill(null);
        state.currentIdx = 0;
        startPage.style.display = 'none';
        quizPage.style.display = 'block';
        qUserName.textContent = name;
        renderQuestion();
    }

    // ============================================================
    // 渲染题目
    // ============================================================
    function renderQuestion() {
        const idx = state.currentIdx;
        const q = QUESTIONS[idx];
        qCategory.textContent = q.cat;
        qNumber.textContent = `第 ${idx+1} / 64 题`;
        qText.textContent = q.q;

        // 进度
        const answered = state.answers.filter(a => a !== null).length;
        const pct = (answered / 64) * 100;
        progressFill.style.width = pct + '%';
        qNum.textContent = idx + 1;

        // 选项
        options.innerHTML = '';
        q.opts.forEach((opt, oi) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn' + (state.answers[idx] === oi ? ' selected' : '');
            btn.textContent = opt;
            btn.addEventListener('click', () => selectOption(oi));
            options.appendChild(btn);
        });

        updateButtons();
    }

    function selectOption(oi) {
        state.answers[state.currentIdx] = oi;
        const btns = options.querySelectorAll('.option-btn');
        btns.forEach((b, i) => b.classList.toggle('selected', i === oi));
        updateButtons();
        // 自动更新进度
        const answered = state.answers.filter(a => a !== null).length;
        const pct = (answered / 64) * 100;
        progressFill.style.width = pct + '%';
    }

    function updateButtons() {
        prevBtn.disabled = state.currentIdx === 0;
        const hasAnswer = state.answers[state.currentIdx] !== null;
        const isLast = state.currentIdx === 63;
        if(isLast) {
            nextBtn.textContent = '🎯 查看画像';
            nextBtn.disabled = !hasAnswer;
        } else {
            nextBtn.textContent = '下一题 →';
            nextBtn.disabled = !hasAnswer;
        }
    }

    // 导航
    prevBtn.addEventListener('click', () => {
        if(state.currentIdx > 0) { state.currentIdx--; renderQuestion(); }
    });
    nextBtn.addEventListener('click', () => {
        if(state.answers[state.currentIdx] === null) return;
        if(state.currentIdx === 63) { showResult(); return; }
        state.currentIdx++;
        renderQuestion();
    });

    // 键盘
    document.addEventListener('keydown', e => {
        if(quizPage.style.display !== 'block') return;
        if(e.key === 'ArrowLeft' && !prevBtn.disabled) prevBtn.click();
        if(e.key === 'ArrowRight' && !nextBtn.disabled) nextBtn.click();
        if(e.key >= '1' && e.key <= '4') {
            const idx = parseInt(e.key) - 1;
            const btns = options.querySelectorAll('.option-btn');
            if(btns[idx]) btns[idx].click();
        }
    });

    // ============================================================
    // 生成画像
    // ============================================================
    function analyzePersonality(answers) {
        // 性格维度（1-24题）
        const extrovert = [0,1].filter(i => answers[i]===0).length; // E
        const introvert = [0,1].filter(i => answers[i]===1).length; // I
        const social = answers[0]; // 0=外 1=内 2=中间 3=随性
        const decision = answers[2]; // 0=逻辑 1=直觉 2=他人 3=经验
        const novelty = answers[3]; // 0=积极 1=谨慎 2=观望 3=只接受
        const teamRole = answers[4]; // 0=领导 1=执行 2=协调 3=创意
        const stress = answers[8]; // 0=运动 1=倾诉 2=独处 3=吃
        const energy = answers[23]; // 0=社交 1=独处 2=爱好 3=成就

        let personalityType = '';
        let personalityDesc = '';

        // 外向/内向
        const isExtrovert = (social===0) || (energy===0);
        const isIntrovert = (social===1) || (energy===1);

        if(isExtrovert && decision===0) personalityType = '理性行动派';
        else if(isExtrovert && decision===1) personalityType = '热情社交派';
        else if(isIntrovert && decision===0) personalityType = '冷静思考派';
        else if(isIntrovert && decision===1) personalityType = '内敛敏感派';
        else if(novelty===0) personalityType = '开放冒险派';
        else personalityType = '谨慎稳健派';

        if(isExtrovert) personalityDesc = '你从社交中获得能量，喜欢与人互动，在人群中感到自在。';
        else personalityDesc = '你从独处中获得能量，需要个人空间来恢复精力。';

        if(decision===0) personalityDesc += '你习惯用理性分析做决策，注重事实和逻辑。';
        else personalityDesc += '你习惯跟随内心感受做决策，注重价值观和情感。';

        // 喜好维度（25-44题）
        const foodPref = answers[25]; // 0=辣 1=甜 2=咸 3=酸
        const travelPref = answers[36]; // 0=自由行 1=跟团 2=文化 3=度假
        const musicPref = answers[27]; // 0=流行 1=摇滚 2=民谣 3=说唱
        const socialPref = answers[30]; // 0=大型 1=小圈子 2=一对一 3=线上
        const sportPref = answers[34]; // 0=球类 1=跑步 2=游泳 3=不运动

        // 弱点维度（45-64题）
        const topWeakness = [
            ['拖延症','容易暴躁','过于敏感','优柔寡断'],
            ['未来不确定性','人际关系','工作压力','金钱问题'],
            ['社交沟通','时间管理','情绪控制','坚持到底']
        ];
        const weakness1 = answers[44];
        const weakness2 = answers[45];
        const weakness3 = answers[46];

        return {
            type: personalityType,
            desc: personalityDesc,
            traits: {
                extrovert: isExtrovert,
                introvert: isIntrovert,
                rational: decision===0,
                emotional: decision===1,
                adventurous: novelty===0 || novelty===3,
                cautious: novelty===1 || novelty===2,
                leader: teamRole===0,
                executor: teamRole===1
            },
            likes: {
                food: ['辣味','甜味','咸味','酸味'][foodPref] || '多样化',
                music: ['流行音乐','摇滚/电子','民谣/轻音乐','说唱/R&B'][musicPref] || '多样化',
                social: ['大型派对','小圈子聚会','一对一深聊','线上聊天'][socialPref] || '看情况',
                travel: ['自由行探险','跟团省心','文化深度游','度假放松'][travelPref] || '看心情',
                sport: ['球类运动','跑步/健身','游泳/瑜伽','不太运动'][sportPref] || '看情况'
            },
            weaknesses: [
                ['拖延症','容易暴躁','过于敏感','优柔寡断'][weakness1] || '难以确定',
                ['未来不确定性','人际关系','工作/学业压力','金钱问题'][weakness2] || '难以确定',
                ['社交沟通','时间管理','情绪控制','坚持到底'][weakness3] || '难以确定'
            ],
            rawAnswers: answers.slice()
        };
    }

    function showResult() {
        quizPage.style.display = 'none';
        resultPage.style.display = 'block';

        const analysis = analyzePersonality(state.answers);
        const name = state.name;

        // 生成回答日志（每题答案）
        let logHTML = '';
        for(let i=0; i<64; i++) {
            const q = QUESTIONS[i];
            const ans = state.answers[i];
            const ansText = ans !== null ? q.opts[ans] : '未回答';
            logHTML += `<div>Q${i+1}. ${q.q} → <span>${ansText}</span></div>`;
        }

        resultCard.innerHTML = `
            <div class="r-name">🧩 ${name}</div>
            <div class="r-sub">基于64道题得出的深度人格画像</div>

            <div class="section-title"><span class="emoji">🎯</span>核心性格类型</div>
            <div style="text-align:center;font-size:28px;color:#f093fb;font-weight:800;margin-bottom:8px;">${analysis.type}</div>
            <div style="color:rgba(255,255,255,0.6);font-size:14px;line-height:1.8;margin-bottom:16px;">${analysis.desc}</div>

            <div class="section-title"><span class="emoji">📊</span>性格维度</div>
            <div class="trait-bar-wrap">
                <div class="trait-label"><span>外向</span><span class="val">${analysis.traits.extrovert ? '较强' : '一般'}</span></div>
                <div class="trait-bar-bg"><div class="trait-bar-fill" style="width:${analysis.traits.extrovert ? 70 : 30}%"></div></div>
            </div>
            <div class="trait-bar-wrap">
                <div class="trait-label"><span>理性</span><span class="val">${analysis.traits.rational ? '较强' : '一般'}</span></div>
                <div class="trait-bar-bg"><div class="trait-bar-fill" style="width:${analysis.traits.rational ? 65 : 35}%"></div></div>
            </div>
            <div class="trait-bar-wrap">
                <div class="trait-label"><span>冒险精神</span><span class="val">${analysis.traits.adventurous ? '较强' : '一般'}</span></div>
                <div class="trait-bar-bg"><div class="trait-bar-fill" style="width:${analysis.traits.adventurous ? 65 : 35}%"></div></div>
            </div>
            <div class="trait-bar-wrap">
                <div class="trait-label"><span>领导倾向</span><span class="val">${analysis.traits.leader ? '较强' : '一般'}</span></div>
                <div class="trait-bar-bg"><div class="trait-bar-fill" style="width:${analysis.traits.leader ? 60 : 40}%"></div></div>
            </div>

            <div class="section-title"><span class="emoji">❤️</span>喜好画像</div>
            <div class="tag-list">
                <span class="tag-item">🍲 口味: ${analysis.likes.food}</span>
                <span class="tag-item">🎵 音乐: ${analysis.likes.music}</span>
                <span class="tag-item">👥 社交: ${analysis.likes.social}</span>
                <span class="tag-item">✈️ 旅行: ${analysis.likes.travel}</span>
                <span class="tag-item">🏃 运动: ${analysis.likes.sport}</span>
            </div>

            <div class="section-title"><span class="emoji">⚠️</span>主要弱点</div>
            <div class="tag-list">
                <span class="tag-item">🔴 ${analysis.weaknesses[0]}</span>
                <span class="tag-item">🟡 ${analysis.weaknesses[1]}</span>
                <span class="tag-item">🟠 ${analysis.weaknesses[2]}</span>
            </div>

            <div class="answer-log">
                <div class="log-title" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">📋 查看全部64题答案记录 — 点击展开</div>
                <div class="log-content" style="display:none">${logHTML}</div>
            </div>

            <button class="btn-restart" onclick="restart()">🔄 重新测试</button>
        `;
    }

    function restart() {
        resultPage.style.display = 'none';
        startPage.style.display = 'block';
        state.answers.fill(null);
        nameInput.value = '';
        nameInput.placeholder = '你的名字或昵称';
        nameInput.style.borderColor = '';
    }
    </script>
</body>
</html>
